name: Build and Push Docker Image

on:
  push:
    branches:
      - main

env:
  REGISTRY: crpi-9oub52jb2l4ud5rl.cn-hangzhou.personal.cr.aliyuncs.com
  # 💡 定义两个独立的镜像名称
  FRONTEND_IMAGE: xiaoweicompany/hrcontract-frontend
  BACKEND_IMAGE: xiaoweicompany/hrcontract-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Alibaba Cloud Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1. 💡 自动化打包并推送前端容器
      - name: Build and push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend  # 💡 关键：指定前端 Dockerfile 路径
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      # 2. 💡 自动化打包并推送后端容器
      - name: Build and push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.backend   # 💡 关键：指定后端 Dockerfile 路径
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}