server {
    listen       80;
    server_name  localhost;

    # 1. 托管前端静态网页
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # 💡 解决 Vue Router 在 History 模式下刷新页面报 404 的经典问题
        try_files $uri $uri/ /index.html;
    }

    # 2. 💡 核心反向代理：处理前端相对路径发出的业务请求
    location /api {
        # 利用 docker-compose 内部的 hr_network 桥接网络
        # 前端容器能直接用“服务名”精准定位到后端容器运行的 9080 端口
        proxy_pass http://hr-backend:9080;
        
        # 传递真实的客户端透传信息，方便后端做日志审计和鉴权
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 💡 解除 Nginx 默认 1MB 的上传限制，确保大体积合同 PDF/图片文件可以顺利上传落库
        client_max_body_size 50m;
    }

    # 错误页面兜底
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}